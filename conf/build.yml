# Per-project x per-part toolchain/platform mapping for this component.
#
# sil is the SIL test-harness application - one fixed target (sil). Added
# here per plan.md item 10 (docs/build_conanfile_commonization_plan.md
# section 2.2) so build.py stops special-casing it: PROJECT is accepted (to
# keep the same entry-point shape as every other component, matching
# perception-core's own precedent) even though nothing branches on it yet.
#
# requires:/tool_requires: below are step 5's move of today's existing,
# unchanged dependency list (protobuf, adas-interfaces) off a hardcoded
# conanfile.py class attribute onto the same data-driven
# requirements()/build_requirements() pattern df/vdy/perception-core already
# use (docs/build_conanfile_commonization_plan.md §6 table) - same
# dependencies, same versions, just declared as data now. adas-df/adas-vdy
# added below per plan.md item 11 / docs/sil_dependency_wiring_plan.md §2 -
# conanfile.py's requirements()/build_requirements() already read this list
# generically, so no code change was needed to pick these up.

layout_kind: output_folder

# recipe: Conan-package identity read by the byte-identical conanfile.py
# template (plan.md item 20, docs/conanfile_commonality_plan.md §7.2). The SIL
# harness is an application - no consumable artifact, only package_type needed.
recipe:
  type: application

# package_kind removed entirely (item 10's own follow-up finding, plan.md,
# 2026-07-20) - conanfile.py's layout() now branches on Conan's own
# self.package_type ("application") instead of a redundant second field.
# No separate targets: field (§2.1a, revised 2026-07-20) - sil's one real
# target is already its own explicit `sil:` key below with its own
# platforms: list; build.py discovers it directly, no anchor needed since
# there's only the one target.

variants:
  base:
    requires:
      - protobuf/3.21.12
      - adas-interfaces/1.0.0
      - adas-df/0.1.0
      - adas-vdy/0.1.0
    tool_requires:
      - protobuf/3.21.12
    sil:
      platforms: &base_platforms
        - build: vs2026
    # Rest of the frozen target vocabulary (plan.md item 14,
    # docs/build_grammar.md) - uncomment as each gains a real implementation:
    # coverage: { platforms: *base_platforms }        # gtest + OpenCppCoverage/gcov
    # docs:     { platforms: [{ build: noarch }] }    # doxygen; noarch = platform-independent
    # package:  { platforms: *base_platforms }        # conan create (+ --upload)
    # prod:     { platforms: [{ build: aarch64_qcc_qnx }, { build: tda4_ti }] }
  cus1:
    requires:
      - protobuf/3.21.12
      - adas-interfaces/1.0.0
      - adas-df/0.1.0
      - adas-vdy/0.1.0
    tool_requires:
      - protobuf/3.21.12
    sil:
      platforms:
        - build: vs2026
